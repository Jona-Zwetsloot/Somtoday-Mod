<!DOCTYPE html>
<html>

<head>
    <title>Somtoday Skeleton Layout</title>
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --bg: #181c20;
            --bg-skeleton: #252b30;
            --bg-skeleton-overlay: linear-gradient(90deg,
                    rgba(255,255,255,0) 0%,
                    rgba(255,255,255,0.15) 50%,
                    rgba(255,255,255,0) 100%);
            --border: 1px solid #374048;
        }

        body {
            background: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }

        .grow {
            flex-grow: 1;
        }

        header,
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            gap: 18px;
        }

        main {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
        }

        header {
            height: 64px;
        }

        nav {
            height: 56px;
            border-top: var(--border);
        }

        nav .grow {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .skeleton {
            position: relative;
            background: var(--bg-skeleton);
            overflow: hidden;
        }

        .skeleton::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-skeleton-overlay);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -100% 0;
            }

            100% {
                background-position: 100% 0;
            }
        }

        .skeleton-icon {
            width: 22px;
            height: 22px;
            border-radius: 5px;
        }

        .skeleton-avatar {
            width: 32px;
            height: 32px;
            border-radius: 12px;
        }

        .skeleton-heading {
            height: 32px;
            width: 40%;
            border-radius: 8px;
        }

        .skeleton-text {
            height: 64px;
            width: 100%;
            border-radius: 8px;
        }

        .skeleton-nav {
            height: 20px;
            width: 70px;
            border-radius: 6px;
        }
    </style>
</head>

<body>
<header>
    <div class="skeleton skeleton-icon"></div>
    <div class="skeleton skeleton-avatar"></div>
    <div class="grow"></div>
    <div class="skeleton skeleton-icon"></div>
    <div class="skeleton skeleton-icon"></div>
    <div class="skeleton skeleton-icon"></div>
</header>
<main class="grow">
    <div class="skeleton skeleton-heading"></div>
    <div class="skeleton skeleton-text"></div>
</main>
<nav>
    <div class="grow">
        <div class="skeleton skeleton-nav"></div>
    </div>
    <div class="grow">
        <div class="skeleton skeleton-nav"></div>
    </div>
    <div class="grow">
        <div class="skeleton skeleton-nav"></div>
    </div>
    <div class="grow">
        <div class="skeleton skeleton-nav"></div>
    </div>
</nav>
</body>

</html>
